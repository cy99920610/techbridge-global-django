{% extends 'panel/base.html' %}
{% block page_title %}Edit Item — {{ item.title }}{% endblock %}
{% block content %}
<div class="panel-card">
    <form method="post" class="panel-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="panel-actions">
            <button class="panel-btn primary" type="submit">Save</button>
            <a class="panel-btn secondary" href="{% url 'panel_service_items' category.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
